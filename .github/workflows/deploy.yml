name: Deploy avaram.co

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy with rsync (password auth)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '65002' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          if ! command -v sshpass >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y sshpass >/dev/null 2>&1
          fi

          # Deploy root-level custom files (exclude WP subdir and runtime data).
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='wordpress' \
            --exclude='data/bookings.json' \
            -czf - . \
            | SSHPASS="$DEPLOY_PASSWORD" sshpass -e ssh -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "mkdir -p '$DEPLOY_PATH' && tar -xzf - -C '$DEPLOY_PATH'"

          # Deploy only wp-content custom code, excluding backups/uploads/cache.
          tar \
            --exclude='wp-content/plugins/updraftplus' \
            --exclude='wp-content/updraft' \
            --exclude='wp-content/uploads' \
            --exclude='wp-content/cache' \
            --exclude='wp-content/upgrade' \
            -czf - -C wordpress wp-content \
            | SSHPASS="$DEPLOY_PASSWORD" sshpass -e ssh -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "mkdir -p '$DEPLOY_PATH' && tar -xzf - -C '$DEPLOY_PATH'"

      - name: Set permissions on deployed files
        continue-on-error: true
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass >/dev/null 2>&1
          SSHPASS="$DEPLOY_PASSWORD" sshpass -e ssh -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" "chmod -R 755 '$DEPLOY_PATH'/*/ && chmod -R 644 '$DEPLOY_PATH'/* && test -f '$DEPLOY_PATH'/wp-content/themes/avaramco/functions.php && echo OK_THEME_FOUND || echo WARNING_THEME_NOT_FOUND"
