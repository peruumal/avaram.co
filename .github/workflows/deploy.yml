name: Deploy avaram.co

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          if [ -n "$DEPLOY_SSH_KEY_B64" ]; then
            echo "$DEPLOY_SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          elif [ -n "$DEPLOY_SSH_KEY" ]; then
            printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          else
            echo "Missing SSH key secret. Set DEPLOY_SSH_KEY or DEPLOY_SSH_KEY_B64."
            exit 1
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy custom pages and assets
        run: |
          # Sync root-level custom files.
          # The server has WP core at public_html root already; we don't touch those.
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='wordpress/' \
            --exclude='data/bookings.json' \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Deploy theme and custom plugins
        run: |
          # Sync only wp-content (theme + plugins we own); server uploads/cache stay intact.
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT" \
            --exclude='uploads/' \
            --exclude='cache/' \
            --exclude='upgrade/' \
            wordpress/wp-content/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/wp-content/"

      - name: Post-deploy permissions
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" << 'EOF'
            cd "${{ secrets.DEPLOY_PATH }}"
            find . -type d -exec chmod 755 {} \;
            find . -type f -exec chmod 644 {} \;
            if [ -f "wp-content/themes/avaramco/functions.php" ]; then
              echo "Theme present: avaramco"
            fi
          EOF
