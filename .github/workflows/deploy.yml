name: Deploy avaram.co

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy with rsync (password auth)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '65002' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          if ! command -v sshpass >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y sshpass >/dev/null 2>&1
          fi

          # Build one deploy bundle locally, then upload once to avoid intermittent second SSH auth failures.
          rm -rf /tmp/avaram_deploy_bundle
          mkdir -p /tmp/avaram_deploy_bundle

          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='wordpress/' \
            --exclude='data/bookings.json' \
            --exclude='wp-login.php' \
            --exclude='wp-cron.php' \
            --exclude='wp-activate.php' \
            --exclude='wp-comments-post.php' \
            --exclude='wp-signup.php' \
            --exclude='xmlrpc.php' \
            --exclude='wp-admin/' \
            --exclude='wp-json/' \
            ./ /tmp/avaram_deploy_bundle/

          mkdir -p /tmp/avaram_deploy_bundle/wp-content
          rsync -a \
            --exclude='plugins/updraftplus/' \
            --exclude='updraft/' \
            --exclude='uploads/' \
            --exclude='cache/' \
            --exclude='upgrade/' \
            wordpress/wp-content/ /tmp/avaram_deploy_bundle/wp-content/

          tar -czf - -C /tmp/avaram_deploy_bundle . \
            | SSHPASS="$DEPLOY_PASSWORD" sshpass -e ssh -o PubkeyAuthentication=no -o PreferredAuthentications=password -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "mkdir -p '$DEPLOY_PATH' && tar -xzf - -C '$DEPLOY_PATH'"

      - name: Cleanup stale wrapper files and fix permissions
        continue-on-error: true
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          set -euo pipefail
          if ! command -v sshpass >/dev/null 2>&1; then
            sudo apt-get install -y sshpass >/dev/null 2>&1
          fi
          # Use unquoted heredoc so $DEPLOY_PATH expands locally;
          # remote-side loop variables are escaped with \$ to prevent local expansion.
          SSHPASS="$DEPLOY_PASSWORD" sshpass -e ssh -o PubkeyAuthentication=no -o PreferredAuthentications=password -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" bash << ENDSSH
            set -e
            cd "$DEPLOY_PATH"

            # Remove stale local-redirect wrapper files that overwrote WP core on previous deploys.
            for f in wp-login.php wp-cron.php wp-activate.php wp-comments-post.php wp-signup.php xmlrpc.php; do
              if [ -f "\$f" ]; then
                size=\$(wc -c < "\$f")
                if [ "\$size" -lt 500 ]; then
                  rm -f "\$f"
                  echo "REMOVED_WRAPPER: \$f"
                else
                  echo "KEPT_REAL_FILE: \$f (\${size} bytes)"
                fi
              fi
            done

            # Remove stale wp-json/index.php redirect wrapper if present.
            if [ -f "wp-json/index.php" ]; then
              sz=\$(wc -c < "wp-json/index.php")
              if [ "\$sz" -lt 500 ]; then
                rm -f wp-json/index.php
                echo "REMOVED_WRAPPER: wp-json/index.php"
              fi
            fi

            # Remove stale wp-admin/index.php redirect wrapper if present.
            if [ -f "wp-admin/index.php" ]; then
              sz=\$(wc -c < "wp-admin/index.php")
              if [ "\$sz" -lt 500 ]; then
                rm -f wp-admin/index.php
                echo "REMOVED_WRAPPER: wp-admin/index.php"
              fi
            fi

            # Diagnostic: report whether WP core files are present at deploy path.
            for probe in wp-blog-header.php wp-load.php wp-settings.php wp-config.php; do
              if [ -f "\$probe" ]; then
                echo "WP_CORE_PRESENT: \$probe"
              else
                echo "WP_CORE_MISSING: \$probe"
              fi
            done

            # Fix permissions: directories 755, files 644.
            find . -type d -exec chmod 755 {} +
            find . -type f -exec chmod 644 {} +

            # Theme check.
            if [ -f "wp-content/themes/avaramco/functions.php" ]; then
              echo "OK_THEME_FOUND"
            else
              echo "WARNING_THEME_NOT_FOUND"
            fi
          ENDSSH
