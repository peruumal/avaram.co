name: Deploy avaram.co

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='wordpress/wp-content/uploads/' \
            --exclude='wordpress/wp-content/cache/' \
            --exclude='wordpress/wp-content/upgrade/' \
            --exclude='data/bookings.json' \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}"

      - name: Post-deploy permissions and cache flush
        run: |
          ssh -p "$DEPLOY_PORT" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" << 'EOF'
            cd "${{ secrets.DEPLOY_PATH }}"
            find . -type d -exec chmod 755 {} \;
            find . -type f -exec chmod 644 {} \;
            if [ -f "wordpress/wp-content/themes/avaramco/functions.php" ]; then
              echo "Theme present: avaramco"
            fi
          EOF
