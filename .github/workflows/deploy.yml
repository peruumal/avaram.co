name: Deploy avaram.co

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy with rsync (password auth)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y sshpass >/dev/null 2>&1

          run_rsync() {
            set +e
            SSHPASS="$DEPLOY_PASSWORD" sshpass -e rsync "$@"
            code=$?
            if [ "$code" -ne 0 ]; then
              echo "rsync returned code=$code, retrying once..."
              SSHPASS="$DEPLOY_PASSWORD" sshpass -e rsync "$@"
              code=$?
            fi
            set -e
            if [ "$code" -eq 3 ] || [ "$code" -eq 23 ] || [ "$code" -eq 24 ]; then
              echo "rsync completed with non-fatal warning (code=$code); continuing."
              return 0
            fi
            return "$code"
          }

          run_rsync -rlvz \
            -e "ssh -p $DEPLOY_PORT" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='wordpress/' \
            --exclude='data/bookings.json' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

          run_rsync -rlvz \
            -e "ssh -p $DEPLOY_PORT" \
            --exclude='plugins/updraftplus/' \
            --exclude='updraft/' \
            --exclude='uploads/' \
            --exclude='cache/' \
            --exclude='upgrade/' \
            wordpress/wp-content/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/wp-content/"

      - name: Set permissions on deployed files
        continue-on-error: true
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass >/dev/null 2>&1
          SSHPASS="$DEPLOY_PASSWORD" sshpass -e ssh -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" "chmod -R 755 '$DEPLOY_PATH'/*/ && chmod -R 644 '$DEPLOY_PATH'/* && test -f '$DEPLOY_PATH'/wp-content/themes/avaramco/functions.php && echo OK_THEME_FOUND || echo WARNING_THEME_NOT_FOUND"
